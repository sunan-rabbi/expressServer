name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: Skip health check
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: lts/*

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host ${{ secrets.EC2_HOST }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH Connection
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH connection successful'"

      - name: Setup PostgreSQL
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            DB_USER='${{ secrets.DB_USER }}'
            DB_PASS='${{ secrets.DB_PASSWORD }}'
            DB_NAME='${{ secrets.DB_NAME }}'

            if ! command -v psql >/dev/null 2>&1; then
              sudo apt update
              sudo apt install -y postgresql postgresql-contrib
            fi

            sudo systemctl enable postgresql
            sudo systemctl start postgresql

            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"

            sudo -u postgres psql -c "ALTER USER \"${DB_USER}\" CREATEDB;"

            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE \"${DB_NAME}\" OWNER \"${DB_USER}\";"

            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"${DB_NAME}\" TO \"${DB_USER}\";"
          ENDSSH

      - name: Clone or Update Repository
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            REPO='${{ secrets.REPO }}'
            BRANCH='${{ github.ref_name }}'
            DEPLOY_PATH="$HOME/${REPO}"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone --branch "$BRANCH" https://github.com/${{ github.repository }}.git "$DEPLOY_PATH"
            else
              cd "$DEPLOY_PATH"
              git fetch origin
              git checkout "$BRANCH"
              git pull --ff-only origin "$BRANCH"
            fi
          ENDSSH

      - name: Install Backend Dependencies
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            REPO='${{ secrets.REPO }}'
            DEPLOY_PATH="$HOME/${REPO}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use '${{ env.NODE_VERSION }}' || true

            cd "$DEPLOY_PATH"
            npm install
          ENDSSH

      - name: Create Environment File
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            REPO='${{ secrets.REPO }}'
            DEPLOY_PATH="$HOME/${REPO}"

            cd "$DEPLOY_PATH"

            cp .env.example .env
          ENDSSH

      - name: Prisma Setup and Build
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            REPO='${{ secrets.REPO }}'
            DEPLOY_PATH="$HOME/${REPO}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use '${{ env.NODE_VERSION }}' || true

            cd "$DEPLOY_PATH"

            npm run genKey
            npx prisma migrate deploy
            npm run generate
            npm run build
          ENDSSH

      - name: Restart Backend Service
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            REPO='${{ secrets.REPO }}'
            DEPLOY_PATH="$HOME/${REPO}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use '${{ env.NODE_VERSION }}' || true

            pm2 delete server || true
            pm2 start "$DEPLOY_PATH/dist/server.js" --name server --cwd "$DEPLOY_PATH"
            pm2 save
            pm2 status
          ENDSSH